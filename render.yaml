services:
  - type: web
    name: shortvid
    runtime: node
    plan: free
    healthCheckPath: /api/health
    # NODE_ENV=production skips devDependencies; Vite lives in devDependencies — must install it for build.
    buildCommand: "cd frontend && npm install --include=dev && npx --yes vite build && cd ../backend && npm install"
    startCommand: "node backend/src/index.js"
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: NODE_ENV
        value: production
      # No manual paste: Render generates at deploy time (see Environment in dashboard if you need the value).
      - key: JWT_SECRET
        generateValue: true
      # Optional integrations — empty until you add keys under Service → Environment.
      - key: PEXELS_API_KEY
        value: ""
      - key: SHOTSTACK_API_KEY
        value: ""
      # Shotstack defaults are in code (api.shotstack.io, v1); override only if needed.
